<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecapHQ — Logo Concepts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f2f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 48px 40px; }
    h1 { color: #8892a4; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
    .card { background: white; border-radius: 16px; padding: 40px 48px; margin-bottom: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .label { color: #8892a4; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 28px; }
    .row { display: flex; gap: 48px; align-items: center; flex-wrap: wrap; }
    .dark { background: #1a2357; border-radius: 12px; padding: 20px 32px; }
    .divider { border: none; border-top: 1px solid #edf0f7; margin: 28px 0; }
  </style>
</head>
<body>
  <h1>RecapHQ — Logo Concepts</h1>

  <!-- CONCEPT A -->
  <div class="card">
    <p class="label">Concept A — Pure Wordmark</p>
    <div class="row">
      <!-- light -->
      <svg width="240" height="56" viewBox="0 0 240 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="800" letter-spacing="-2" fill="#1a2357">RECAP</text>
        <text x="163" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="800" letter-spacing="-2" fill="#f7c800">HQ</text>
        <rect x="0" y="50" width="215" height="3.5" rx="1.75" fill="#f7c800" opacity="0.35"/>
      </svg>
      <!-- dark -->
      <div class="dark">
        <svg width="240" height="56" viewBox="0 0 240 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="800" letter-spacing="-2" fill="white">RECAP</text>
          <text x="163" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="800" letter-spacing="-2" fill="#f7c800">HQ</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- CONCEPT B -->
  <div class="card">
    <p class="label">Concept B — Document Icon + Wordmark</p>
    <div class="row">
      <!-- light -->
      <svg width="290" height="64" viewBox="0 0 290 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- document icon -->
        <rect x="0" y="2" width="46" height="58" rx="7" fill="#1a2357"/>
        <rect x="9" y="14" width="28" height="3.5" rx="1.75" fill="white" opacity="0.9"/>
        <rect x="9" y="23" width="22" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
        <rect x="9" y="32" width="25" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
        <rect x="9" y="41" width="18" height="3.5" rx="1.75" fill="#f7c800"/>
        <!-- wordmark -->
        <text x="60" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" letter-spacing="-1" fill="#1a2357">Recap</text>
        <text x="192" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="900" fill="#f7c800">HQ</text>
      </svg>
      <!-- dark -->
      <div class="dark">
        <svg width="290" height="64" viewBox="0 0 290 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="2" width="46" height="58" rx="7" fill="rgba(255,255,255,0.12)"/>
          <rect x="9" y="14" width="28" height="3.5" rx="1.75" fill="white" opacity="0.9"/>
          <rect x="9" y="23" width="22" height="3.5" rx="1.75" fill="white" opacity="0.45"/>
          <rect x="9" y="32" width="25" height="3.5" rx="1.75" fill="white" opacity="0.45"/>
          <rect x="9" y="41" width="18" height="3.5" rx="1.75" fill="#f7c800"/>
          <text x="60" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" letter-spacing="-1" fill="white">Recap</text>
          <text x="192" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="900" fill="#f7c800">HQ</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- CONCEPT C -->
  <div class="card">
    <p class="label">Concept C — Pill Badge + Stacked Wordmark</p>
    <div class="row">
      <!-- light -->
      <svg width="200" height="72" viewBox="0 0 200 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- pill badge -->
        <rect x="0" y="0" width="72" height="72" rx="16" fill="#1a2357"/>
        <text x="8" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="900" fill="white">R</text>
        <rect x="38" y="18" width="22" height="22" rx="5" fill="#f7c800"/>
        <text x="42" y="35" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="900" fill="#1a2357">HQ</text>
        <!-- text stack -->
        <text x="86" y="30" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3.5" fill="#8892a4">WEEKLY</text>
        <text x="86" y="58" font-family="'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="800" letter-spacing="-0.5" fill="#1a2357">RecapHQ</text>
      </svg>
      <!-- dark -->
      <div class="dark">
        <svg width="200" height="72" viewBox="0 0 200 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="72" height="72" rx="16" fill="#f7c800"/>
          <text x="8" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="900" fill="#1a2357">R</text>
          <rect x="38" y="18" width="22" height="22" rx="5" fill="#1a2357"/>
          <text x="42" y="35" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="900" fill="#f7c800">HQ</text>
          <text x="86" y="30" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3.5" fill="rgba(255,255,255,0.45)">WEEKLY</text>
          <text x="86" y="58" font-family="'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="800" letter-spacing="-0.5" fill="white">RecapHQ</text>
        </svg>
      </div>
    </div>
  </div>

</body>
</html>
